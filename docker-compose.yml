version: "3.8"

services:
  backend:
    image: "docker-registry.yes.com.sv/it-inv:backend"
    container_name: it-inv-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST:-192.168.101.77}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-tomapedidos}
      - DB_USER=${DB_USER:-tomapedidos}
      - DB_PASSWORD=${DB_PASSWORD:-Lac2025+}
      - DB_SCHEMA=${DB_SCHEMA:-it-inv}
      - JWT_SECRET=${JWT_SECRET:-AiBtRrK7Piyi9ivVWCUkGlXfEJXdEwX8nMhet6OH5po=}
      - EXTERNAL_AUTH_URL=${EXTERNAL_AUTH_URL:-https://ad-auth.yes.com.sv/auth}
    volumes:
      - uploads-inv:/app/uploads/inventory
    networks:
      - network1
    logging:
      driver: gelf
      options:
        gelf-address: "udp://${LOG_SERVER:-192.168.101.175}:12201"
        tag: "it-inv-back"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  frontend:
    image: "docker-registry.yes.com.sv/it-inv-frontend:latest"
    container_name: it-inv-frontend
    restart: unless-stopped
    expose:
      - "4173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
      - BACKEND_URL=http://it-inv-backend:3000
    depends_on:
      - backend
    networks:
      - network1
    logging:
      driver: gelf
      options:
        gelf-address: "udp://${LOG_SERVER:-192.168.101.175}:12201"
        tag: "it-inv-front"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  network1:
    name: nginx-proxy-manager_default
    external: true

volumes:
  uploads-inv:
    external: true
